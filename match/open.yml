global_vars:
  - name: "open_with_vscode"
    type: echo
    params:
      echo: "open -a Terminal.app; echo 'code {{path}}'"
          # following commands deletes some letters from the file when you open it
          # cmd: "code {{path}}"

matches:
# --- Open terminal, files, or directories ---
  - trigger: ";tml"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "open -a Terminal.app"

  - trigger: ";espanso"
    replace: "{{output}}\n"
    vars:
      # - name: output
      #   type: shell
      #   params:
      #     cmd: "open -a Terminal.app; echo 'code {{ESPANSO}}'"
      - name: path
        type: echo
        params:
          echo: "{{ESPANSO}}"
      - name: output
        type: shell
        params:
          cmd: "{{open_with_vscode}}"

  - trigger: ";blog"
    replace: "{{output}}\n"
    vars:
      - name: path
        type: echo
        params:
          echo: "~/website/nextjs-blog-tutorial/"
      - name: output
        type: shell
        params:
          cmd: "{{open_with_vscode}}"

  - trigger: ";notion"
    replace: "{{output}}\n"
    vars:
      - name: path
        type: echo
        params:
          echo: "/Volumes/notion/notion/"
      - name: output
        type: shell
        params:
          cmd: "{{open_with_vscode}}"

  - trigger: ";quant"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "open {{GITHUB}}/qc/"

# --- Open applications ---
  - trigger: ";line"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "open -a LINE.app"

# --- Select and open a directory in github/ ---
  - trigger: ";cdgh"
    replace: "{{output}}\n"
    vars:
      - name: available
        type: shell
        params:
          cmd: "ls {{GITHUB}}/"
      - name: "form"
        type: form
        params:
          layout: "GitHub Repo Name : [[repo_name]]"
          fields:
            repo_name:
              type: choice
              values: "{{available}}"
      - name: output
        type: shell
        params:
          cmd: "open -a Terminal.app; echo 'code {{GITHUB}}/{{form.repo_name}}'"

# --- File Creation ---
  - trigger: ";memo"
    replace: "{{output}}\n"
    vars:
      - name: output
        type: shell
        params:
          cmd: "cd ~/Desktop/temp/; touch memo.md; open -a Terminal.app; echo 'code ~/Desktop/temp/memo.md'"

# --- Create .url file from clipboard URL ---
  - regex: ";url(?P<name>.*);" # input: ;urlname; → output: name.url
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "cd ~/Desktop; echo '[InternetShortcut]\nURL={{clipboard}}' > {{name}}.url"

# --- Turn webpage into markdown from url ---
  - trigger: ";tomd"
    replace: |
            - Webpage to Markdown Conversion by https://urltomarkdown.herokuapp.com/
            - Source URL: {{clipboard}}
            - Conversion Timestamp: {{now}}
            
            ===================================================
            
            {{output}}
    vars:
      - name: output
        type: shell
        params:
          cmd: |
            curl "https://urltomarkdown.herokuapp.com/?url={{clipboard}}"
